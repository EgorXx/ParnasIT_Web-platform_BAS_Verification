services:
  db:
    image: postgis/postgis:16-3.4
    container_name: bas-postgres
    environment:
      POSTGRES_DB: bas_verification
      POSTGRES_USER: bas_user
      POSTGRES_PASSWORD: bas_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bas_user -d bas_verification"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: bas-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: bas_user
      DB_PASSWORD: bas_pass
      JWT_SECRET: O9RNkDgAuP2py4CvxcdFUsELYzvYWyEa1txbZuy4O+E=
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
