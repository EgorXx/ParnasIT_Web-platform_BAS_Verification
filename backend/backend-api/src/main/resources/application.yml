spring:
  application:
    name: bas-verification
  datasource:
    url: jdbc:postgresql://localhost:5432/bas_verification
    username: ${DB_USER:bas_user}
    password: ${DB_PASSWORD:bas_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisDialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-at-least-256-bits}
    access-token-expiration: 15m
    refresh-token-expiration: 7d

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
