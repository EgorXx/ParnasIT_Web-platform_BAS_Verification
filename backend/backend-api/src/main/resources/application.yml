spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: bas-verification

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/bas_verification
    username: ${DB_USER:bas_user}
    password: ${DB_PASSWORD:bas_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true

app:
  admin:
    name: ${ADMIN_NAME:Admin}
    email: ${ADMIN_EMAIL:admin@bas.ru}
    password: ${ADMIN_PASSWORD:admin}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-at-least-256-bits}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    url: /openapi.yml
